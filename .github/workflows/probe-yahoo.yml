name: probe-yahoo
# Discriminating probe: does Yahoo's earnings-calendar endpoint work from a
# FRESH runner when called slowly, before any bulk traffic? Distinguishes
# "datacenter IPs are blocked" from "our own bulk fetch rate-limits the IP
# before the backfill runs".
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance lxml
      - name: Slow serial earnings-calendar calls, first traffic from this IP
        run: |
          python - <<'EOF'
          import time
          import yfinance as yf
          syms = "AAPL MSFT NVDA DELL MU AMD CRM ORCL AVGO COST TSM JPM".split()
          ok = empty = err = 0
          for s in syms:
              try:
                  ed = yf.Ticker(s).get_earnings_dates(limit=12)
                  n = ed["Reported EPS"].dropna().shape[0] if ed is not None else 0
                  print(f"{s}: {n} reported quarters")
                  ok += 1 if n > 0 else 0
                  empty += 1 if n == 0 else 0
              except Exception as e:
                  print(f"{s}: ERR {type(e).__name__}: {str(e)[:80]}")
                  err += 1
              time.sleep(2)
          print(f"EARNINGS RESULT: ok={ok} empty={empty} err={err} of {len(syms)}")
          # control: chart API from the same runner
          spy = yf.download("SPY", period="5d", progress=False)
          print(f"PRICES RESULT: {len(spy)} rows")
          EOF
