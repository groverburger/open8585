name: weekly-screen

on:
  schedule:
    # Fridays 3PM Pacific (22:00 UTC during PDT; runs 2PM PST in winter —
    # GitHub cron has no timezone support, both are after the 1PM PT close)
    - cron: "0 22 * * 5"
  workflow_dispatch:

permissions:
  contents: write

env:
  # stagger fundamentals refresh across weeks (6-21 day TTL per symbol)
  # so a weekly CI run refetches ~a third of the universe, not all of it
  OPEN8585_FUND_TTL_DAYS: "6"
  OPEN8585_FUND_TTL_JITTER_DAYS: "15"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/fundamentals
            data/prices.parquet
            data/universe.json
            data/benchmark.parquet
          key: open8585-data-${{ github.run_id }}
          restore-keys: open8585-data-

      - name: Run screen and build site
        run: python scripts/publish.py

      - name: Commit weekly archive to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git diff --cached --quiet || git commit -m "Archive weekly screen $(date -u +%F)"
          git push

      - name: Force-push site branch (single commit, no history bloat)
        run: |
          cd site
          git init -q -b site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Site build $(date -u +%F)"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" site
